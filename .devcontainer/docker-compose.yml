services:
  # PostgreSQL database for development
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dev_db}
      POSTGRES_USER: ${POSTGRES_USER:-dev_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    volumes:
      # メジャーバージョンごとにボリュームを分離（旧バージョンのデータディレクトリ非互換による起動失敗を回避）
      - postgres_data_17:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dev_user} -d ${POSTGRES_DB:-dev_db}']
      interval: 30s
      timeout: 10s
      retries: 3

  # Main development container (for devcontainer)
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    hostname: develop
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-dev_user}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-dev_db}
      - PYTHONPATH=/workspace/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data_17:
    driver: local
